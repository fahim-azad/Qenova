<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Organizations - QeNova</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                QeNova
            </a>

            <a href="{% url 'home' %}" class="btn btn-light">
                Back to Home
            </a>

        </div>

    </nav>

    <div class="container py-5">

        <div class="card border-0 shadow-sm rounded-4 mb-4">

            <div class="card-body p-4">

                <h2 class="fw-bold text-primary mb-4">
                    Search Organizations
                </h2>

                <form method="GET" action="{% url 'org_list' %}">

                    <div class="row g-3">

                        <div class="col-md-10">

                            <input
                                type="text"
                                name="q"
                                class="form-control form-control-lg"
                                placeholder="Search by organization name..."
                                value="{{ query }}"
                            >

                        </div>

                        <div class="col-md-2 d-grid">

                            <button type="submit" class="btn btn-primary btn-lg">
                                Search
                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

        <h2 class="fw-bold text-dark mb-4">
            Available Organizations
        </h2>

        <div class="row">

            {% for org in organizations %}

            <div class="col-md-6 col-lg-4 mb-4">

                <div class="card h-100 border-0 shadow-sm rounded-4">

                    <div class="card-body p-4">

                        <h4 class="fw-bold text-primary mb-3">
                            {{ org.organization_name }}
                        </h4>

                        {% if org.working_hours %}

                        <p class="text-muted mb-3">
                            Working Hours: {{ org.working_hours }}
                        </p>

                        {% endif %}

                        <a href="{% url 'org_detail' org.id %}" class="btn btn-primary w-100">
                            View Details
                        </a>

                    </div>

                </div>

            </div>

            {% empty %}

            <div class="col-12">

                <div class="alert alert-warning">
                    No organizations found.
                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</body>
</html>
