<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - QeNova</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">

    <div class="container">

        <div class="card shadow-lg border-0 rounded-4 mx-auto" style="max-width: 650px;">

            <div class="card-body p-5">

                <h2 class="fw-bold text-primary text-center mb-3">
                    Change Your Password
                </h2>

                <p class="text-muted text-center mb-5">
                    Please enter your old password first, then enter your new password twice for verification.
                </p>

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Old Password
                        </label>

                        <input
                            type="password"
                            name="old_password"
                            class="form-control form-control-lg rounded-3"
                            placeholder="Enter old password"
                            required
                        >

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            New Password
                        </label>

                        <input
                            type="password"
                            name="new_password1"
                            class="form-control form-control-lg rounded-3"
                            placeholder="Enter new password"
                            required
                        >

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Confirm New Password
                        </label>

                        <input
                            type="password"
                            name="new_password2"
                            class="form-control form-control-lg rounded-3"
                            placeholder="Confirm new password"
                            required
                        >

                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold rounded-3 shadow-sm">
                        Change My Password
                    </button>

                </form>

                <a href="{% url 'dashboard' %}" class="btn btn-outline-primary w-100 mt-4 rounded-3">
                    Back to Dashboard
                </a>

            </div>

        </div>

    </div>

</body>
</html>
