<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QeNova - Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-primary bg-gradient min-vh-100 d-flex align-items-center justify-content-center">

    <div class="container">

        <div class="card shadow-lg border-0 rounded-4 p-5 mx-auto" style="max-width: 550px;">

            <h1 class="text-center text-primary fw-bold mb-4">
                Join QeNova
            </h1>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control form-control-lg"
                        placeholder="Enter username"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control form-control-lg"
                        placeholder="Enter email"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password1"
                        class="form-control form-control-lg"
                        placeholder="Enter password"
                        required
                    >
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Confirm Password
                    </label>

                    <input
                        type="password"
                        name="password2"
                        class="form-control form-control-lg"
                        placeholder="Confirm password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-3">
                    Register
                </button>
            </form>

            <a href="{% url 'login' %}" class="text-decoration-none text-center d-block mt-4">
                Already have an account? Log in
            </a>

        </div>

    </div>

</body>
</html>
