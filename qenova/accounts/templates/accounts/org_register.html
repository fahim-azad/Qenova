<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QeNova - Organization Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark bg-gradient min-vh-100 d-flex align-items-center justify-content-center">

    <div class="container">

        <div class="card shadow-lg border-0 rounded-4 p-5 mx-auto" style="max-width: 650px;">

            <h1 class="text-center text-dark fw-bold mb-2">
                Register Organization
            </h1>

            <p class="text-center text-muted mb-4">
                Create your organization panel for smart queue management
            </p>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Organization Name
                    </label>

                    <input
                        type="text"
                        name="organization_name"
                        class="form-control form-control-lg"
                        placeholder="Enter organization name"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control form-control-lg"
                        placeholder="Enter organization email"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control form-control-lg"
                        placeholder="Enter username"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password1"
                        class="form-control form-control-lg"
                        placeholder="Enter password"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Confirm Password
                    </label>

                    <input
                        type="password"
                        name="password2"
                        class="form-control form-control-lg"
                        placeholder="Confirm password"
                        required
                    >
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Organization Logo
                    </label>

                    <input
                        type="file"
                        name="logo"
                        class="form-control form-control-lg"
                    >
                </div>

                <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold rounded-3">
                    Register Organization
                </button>
            </form>

            <a href="{% url 'org_login' %}" class="text-decoration-none text-center d-block mt-4">
                Already have an organization account? Log in
            </a>

        </div>

    </div>

</body>
</html>
