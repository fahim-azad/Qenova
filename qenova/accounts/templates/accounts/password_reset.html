<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QeNova - Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">

    <div class="container">

        <div class="card shadow-lg border-0 rounded-4 mx-auto" style="max-width: 600px;">

            <div class="card-body p-5">

                <h2 class="fw-bold text-primary text-center mb-3">
                    Reset Your Password
                </h2>

                <p class="text-muted text-center mb-5">
                    Enter your email address below and we’ll send you instructions to reset your password.
                </p>

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Email Address
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control form-control-lg rounded-3"
                            placeholder="Enter your email address"
                            required
                        >

                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold rounded-3 shadow-sm">
                        Send Reset Link
                    </button>

                </form>

                <a href="{% url 'login' %}" class="btn btn-outline-primary w-100 mt-4 rounded-3">
                    Back to Login
                </a>

            </div>

        </div>

    </div>

</body>
</html>
