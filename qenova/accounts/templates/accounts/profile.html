<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QeNova - Profile Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                QeNova
            </a>

            <div class="d-flex gap-2">

                <a href="{% url 'dashboard' %}" class="btn btn-light">
                    Back to Dashboard
                </a>

                <a href="{% url 'password_change' %}" class="btn btn-outline-light">
                    Change Password
                </a>

            </div>

        </div>

    </nav>

    <div class="container py-5">

        {% if messages %}

        <div class="mb-4">

            {% for message in messages %}

            <div class="alert alert-info shadow-sm">
                {{ message }}
            </div>

            {% endfor %}

        </div>

        {% endif %}

        <div class="card shadow-lg border-0 rounded-4 mx-auto" style="max-width: 750px;">

            <div class="card-body p-5">

                <h1 class="fw-bold text-primary text-center mb-5">
                    My Profile
                </h1>

                <div class="text-center mb-5">

                    {% if user.profile_picture %}

                        <p class="fw-semibold mb-3">
                            Current Profile Picture
                        </p>

                        <img
                            src="{{ user.profile_picture.url }}"
                            alt="Profile Picture"
                            width="150"
                            height="150"
                            class="rounded-circle shadow object-fit-cover border border-3 border-primary"
                        >

                    {% else %}

                        <p class="text-muted">
                            No profile picture uploaded yet.
                        </p>

                    {% endif %}

                </div>

                <form method="post" enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="mb-4">

                        <div class="card border-0 bg-light p-4 rounded-4">

                            {{ form.as_p }}

                        </div>

                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold rounded-3 shadow-sm">
                        Save Profile
                    </button>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
