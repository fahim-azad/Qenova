<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QeNova - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-primary bg-gradient min-vh-100 d-flex align-items-center justify-content-center">

    <div class="container">

        <div class="card shadow-lg border-0 rounded-4 p-5 mx-auto" style="max-width: 500px;">

            <h1 class="text-center text-primary fw-bold mb-4">
                Welcome to QeNova
            </h1>

            {% if messages %}
            <ul class="list-unstyled">
                {% for message in messages %}
                <li class="alert alert-info">
                    {{ message }}
                </li>
                {% endfor %}
            </ul>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control form-control-lg"
                        placeholder="Enter username"
                        required
                    >
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control form-control-lg"
                        placeholder="Enter password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-3">
                    Log In
                </button>
            </form>

            <a href="{% url 'register' %}" class="text-decoration-none text-center d-block mt-4">
                Don't have an account? Register
            </a>

        </div>

    </div>

</body>
</html>
