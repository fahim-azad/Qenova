<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QeNova - Email Sent</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center">

    <div class="container">

        <div class="card shadow-lg border-0 rounded-4 mx-auto text-center" style="max-width: 650px;">

            <div class="card-body p-5">

                <div class="mb-4">

                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center shadow"
                         style="width: 90px; height: 90px; font-size: 40px;">

                        ✉

                    </div>

                </div>

                <h2 class="fw-bold text-primary mb-4">
                    Check Your Inbox
                </h2>

                <p class="text-muted mb-4">
                    We've emailed you instructions for setting your password, if an account exists with the email you entered. You should receive them shortly.
                </p>

                <p class="text-muted mb-5">
                    If you don't receive an email, please make sure you've entered the address you registered with and check your spam folder.
                </p>

                <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5 rounded-3 shadow-sm">
                    Back to Login
                </a>

            </div>

        </div>

    </div>

</body>
</html>
